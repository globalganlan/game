<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thumbnail Renderer</title>
  <style>html,body{height:100%;margin:0;background:transparent}canvas{display:block}</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="importmap">
{
  "imports": {
    "three": "/node_modules/three/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { FBXLoader } from '/node_modules/three/examples/jsm/loaders/FBXLoader.js';
import { GLTFLoader } from '/node_modules/three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from '/node_modules/three/examples/jsm/loaders/DRACOLoader.js';

const params = new URLSearchParams(location.search);
const model = params.get('model');
const anim = params.get('anim');   // optional separate idle animation GLB
const size = parseInt(params.get('size') || '512', 10);
const canvas = document.getElementById('c');
canvas.width = size; canvas.height = size;

const renderer = new THREE.WebGLRenderer({canvas, preserveDrawingBuffer:true, alpha:true, antialias:true});
renderer.setSize(size, size);
renderer.setClearColor(0x000000, 0);
if ( 'outputColorSpace' in renderer ) renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.physicallyCorrectLights = true;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);

const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(1, 2, 1);
scene.add(dir);

// Per-model overrides for models whose bounding box is misleading
const MODEL_OVERRIDES = {
  'zombie_3':  { focusPct: 0.50, distanceMul: 1.2, pixelCrop: true },
  'zombie_14': { focusPct: 0.50, distanceMul: 1.2, pixelCrop: true },
};
const modelName = model ? model.replace(/.*\/models\//, '').split('/')[0] : '';
const overrides = MODEL_OVERRIDES[modelName] || null;

function processModel(obj) {
    // play idle animation if present so we don't capture T-pose
    let mixer = null;
    if (obj.animations && obj.animations.length) {
      mixer = new THREE.AnimationMixer(obj);
      const idleClip = obj.animations.find(c=>/idle/i.test(c.name)) || obj.animations[0];
      const action = mixer.clipAction(idleClip);
      action.play();
      mixer.update(0.6);
    }

    // Models that need PBR brightness fix (dark metallic textures)
    const PBR_EMISSIVE = { zombie_27: 3.0, zombie_29: 5.0 };
    const emissiveVal = PBR_EMISSIVE[modelName] || 0;

    // ensure textures use correct encoding and update materials
    obj.traverse(function(node){
      if (node.isMesh) {
        node.frustumCulled = false;
        const mat = node.material;
        const fixMat = m => {
          if (m.map) { m.map.encoding = THREE.sRGBEncoding; m.map.needsUpdate = true; }
          if (emissiveVal && m.isMeshStandardMaterial) {
            m.metalness = 0;
            m.roughness = 0.8;
            if (m.map) { m.emissive = new THREE.Color(0xffffff); m.emissiveMap = m.map; m.emissiveIntensity = emissiveVal; }
          }
          if (m.needsUpdate !== undefined) m.needsUpdate = true;
        };
        if (Array.isArray(mat)) { mat.forEach(fixMat); } else if (mat) { fixMat(mat); }
      }
    });

    // compute bounding box after applying animation
    if (mixer) mixer.update(0.01);
    const box = new THREE.Box3().setFromObject(obj);
    const sizeVec = new THREE.Vector3();
    box.getSize(sizeVec);
    const center = new THREE.Vector3();
    box.getCenter(center);

    // GLB from Blender may use Z-up: if height (Y) is near zero, swap Y and Z
    let useZ = sizeVec.y < sizeVec.z * 0.3;
    const height = useZ ? sizeVec.z : sizeVec.y;
    const width = Math.max(sizeVec.x, useZ ? sizeVec.y : sizeVec.z);

    // Head focus point: default 82% (humanoid head). Overridden for non-standard models.
    const focusPct = overrides ? overrides.focusPct : 0.82;
    const headY = useZ ? (box.min.z + sizeVec.z * focusPct) : (box.min.y + sizeVec.y * focusPct);

    return { mixer, box, sizeVec, center, height, headY, useZ };
}

if (!model) {
  window.__THUMBNAIL_READY__ = true;
} else {
  const isGLB = /\.glb$/i.test(model);

  function onModelLoaded(obj) {
    scene.add(obj);
    const { mixer, box, sizeVec, center, height, headY, useZ } = processModel(obj);

    // aim at head (approx 80-85% height) and zoom in
    const headTargetY = headY; 
    const maxDim = Math.max(sizeVec.x, sizeVec.y, sizeVec.z);
    const distMul = overrides ? overrides.distanceMul : 0.6;
    const distance = maxDim * distMul;
    
    // Position camera at head height but pulled back
    if (useZ) {
      camera.position.set(center.x, center.y + distance, headTargetY + height * 0.05);
      camera.lookAt(center.x, center.y, headTargetY);
    } else {
      camera.position.set(center.x, headTargetY + height * 0.05, center.z + distance);
      camera.lookAt(center.x, headTargetY, center.z);
    }

    const amb = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(amb);

    // small delay to allow textures/animation to settle, then render
    setTimeout(()=>{
      if (mixer) mixer.update(0.2);
      renderer.render(scene, camera);

      // --- Crop strategy: pixel-based for overridden models, projection-based for others ---
      const pad = Math.max(canvas.width, canvas.height) * 0.05;
      let sx, sy, ex, ey;

      if (overrides && overrides.pixelCrop) {
        // Pixel-based content detection for non-humanoid models (beasts, wide-pose models)
        const gl = renderer.getContext();
        const pixels = new Uint8Array(canvas.width * canvas.height * 4);
        gl.readPixels(0, 0, canvas.width, canvas.height, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

        let pxMinX = canvas.width, pxMaxX = 0, pxMinY = canvas.height, pxMaxY = 0;
        for (let y = 0; y < canvas.height; y++) {
          for (let x = 0; x < canvas.width; x++) {
            const idx = (y * canvas.width + x) * 4;
            if (pixels[idx + 3] > 10) {
              const screenY = canvas.height - 1 - y;
              if (x < pxMinX) pxMinX = x;
              if (x > pxMaxX) pxMaxX = x;
              if (screenY < pxMinY) pxMinY = screenY;
              if (screenY > pxMaxY) pxMaxY = screenY;
            }
          }
        }

        if (pxMaxX <= pxMinX || pxMaxY <= pxMinY) {
          sx = 0; sy = 0; ex = canvas.width; ey = canvas.height;
        } else {
          const contentH = pxMaxY - pxMinY;
          const cropBottomY = pxMinY + contentH * 0.80;
          sx = Math.max(0, pxMinX - pad);
          sy = Math.max(0, pxMinY - pad);
          ex = Math.min(canvas.width, pxMaxX + pad);
          ey = Math.min(canvas.height, cropBottomY + pad);
        }
      } else {
        // Projection-based head crop for humanoid models (works well for standard proportions)
        const headTop = useZ ? box.max.z : box.max.y;
        const headBottom = useZ ? (box.min.z + sizeVec.z * 0.6) : (box.min.y + sizeVec.y * 0.6);
        const headMin = useZ
          ? new THREE.Vector3(box.min.x, box.min.y, headBottom)
          : new THREE.Vector3(box.min.x, headBottom, box.min.z);
        const headMax = useZ
          ? new THREE.Vector3(box.max.x, box.max.y, headTop)
          : new THREE.Vector3(box.max.x, headTop, box.max.z);

        const corners = [];
        for (const x of [headMin.x, headMax.x]) for (const y of [headMin.y, headMax.y]) for (const z of [headMin.z, headMax.z]) {
          corners.push(new THREE.Vector3(x,y,z));
        }

        const px = [], py = [];
        for (const c of corners) {
          const v = c.clone();
          v.project(camera);
          px.push((v.x * 0.5 + 0.5) * canvas.width);
          py.push((-v.y * 0.5 + 0.5) * canvas.height);
        }

        sx = Math.max(0, Math.min(...px));
        sy = Math.max(0, Math.min(...py));
        ex = Math.min(canvas.width, Math.max(...px));
        ey = Math.min(canvas.height, Math.max(...py));
      }

      // Ensure minimum crop size
      const minCropSize = Math.min(canvas.width, canvas.height) * 0.25;
      let sw = ex - sx;
      let sh = ey - sy;
      if (sw < minCropSize) { const add = (minCropSize - sw)/2; sx = Math.max(0, sx - add); ex = Math.min(canvas.width, ex + add); sw = ex - sx; }
      if (sh < minCropSize) { const add = (minCropSize - sh)/2; sy = Math.max(0, sy - add); ey = Math.min(canvas.height, ey + add); sh = ey - sy; }

      // Square crop: expand to square centered on content
      sw = ex - sx; sh = ey - sy;
      const cropSize = Math.max(sw, sh);
      const cxC = sx + sw/2; const cyC = sy + sh/2;
      sx = Math.max(0, Math.round(cxC - cropSize/2));
      sy = Math.max(0, Math.round(cyC - cropSize/2));
      ex = Math.min(canvas.width, sx + cropSize);
      ey = Math.min(canvas.height, sy + cropSize);
      sw = ex - sx; sh = ey - sy;

      // draw cropped region into a new offscreen canvas sized to output 'size'
      const oc = document.createElement('canvas');
      oc.width = size; oc.height = size;
      const octx = oc.getContext('2d');
      octx.clearRect(0,0,size,size);
      octx.drawImage(canvas, sx, sy, sw, sh, 0, 0, size, size);

      // replace main WebGL canvas with a new 2D canvas containing the cropped image
      const newCanvas = document.createElement('canvas');
      newCanvas.id = canvas.id || '';
      newCanvas.width = size; newCanvas.height = size;
      const nctx = newCanvas.getContext('2d');
      nctx.clearRect(0,0,size,size);
      nctx.drawImage(oc, 0, 0);
      canvas.parentNode.replaceChild(newCanvas, canvas);

      window.__THUMBNAIL_READY__ = true;
    }, 250);
  }

  function onError(err) {
    console.error(err);
    window.__THUMBNAIL_READY__ = true;
  }

  /** Load a GLB and return a Promise<GLTF> */
  function loadGLB(url) {
    const gltfLoader = new GLTFLoader();
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('/draco/');
    gltfLoader.setDRACOLoader(dracoLoader);
    return new Promise((resolve, reject) => {
      gltfLoader.load(decodeURIComponent(url), resolve, undefined, reject);
    });
  }

  if (isGLB) {
    // Load mesh, optionally load separate idle animation GLB
    const meshPromise = loadGLB(model);
    const animPromise = anim ? loadGLB(anim) : Promise.resolve(null);
    Promise.all([meshPromise, animPromise]).then(([meshGltf, animGltf]) => {
      const obj = meshGltf.scene;
      // Merge: prefer separate idle anim, fall back to embedded animations
      if (animGltf && animGltf.animations && animGltf.animations.length) {
        obj.animations = animGltf.animations;
      } else {
        obj.animations = meshGltf.animations || [];
      }
      onModelLoaded(obj);
    }).catch(onError);
  } else {
    const fbxLoader = new FBXLoader();
    fbxLoader.load(decodeURIComponent(model), onModelLoaded, undefined, onError);
  }
}
</script>
</body>
</html>
